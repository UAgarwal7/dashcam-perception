<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YOLOv8 Object Detection</title>
    <style>
        canvas {
            display:block;
            border: 1px solid black;
            margin-top:10px;
        }
    </style>
</head>
<body>
    <input id="uploadInput" type="file"/>
    <p id="status"></p>
    <canvas></canvas>
    <script>
       /**
       * "Upload" button onClick handler: uploads selected 
       * image file to backend, receives an array of
       * detected objects and draws them on top of image
       */
       const input = document.getElementById("uploadInput");
       const status = document.getElementById("status");
       input.addEventListener("change",async(event) => {
           const file = event.target.files && event.target.files[0];
           if (!file) {
               status.textContent = "No file selected.";
               return;
           }
           status.textContent = "Detecting…";
           const data = new FormData();
           data.append("image_file",file,file.name);
           const response = await fetch("/detect",{
               method:"post",
               body:data
           });
           if (!response.ok) {
               status.textContent = "Detection request failed (" + response.status + ").";
               console.error("Detect request failed", response.status, await response.text());
               return;
           }
           const boxes = await response.json();
           console.log("boxes:", boxes);
           if (boxes.length === 0) {
               status.textContent = "No objects detected.";
           } else {
               status.textContent = "Detected " + boxes.length + " object(s).";
           }
           draw_image_and_boxes(file,boxes);
       })

       /**
       * Function draws the image from provided file
       * and bounding boxes of detected objects on
       * top of the image
       * @param file Uploaded file object
       * @param boxes Array of bounding boxes in format
         [[x1,y1,x2,y2,object_type,probability],...]
       */
       function draw_image_and_boxes(file,boxes) {
          const img = new Image()
          img.src = URL.createObjectURL(file);
          img.onload = () => {
              const canvas = document.querySelector("canvas");
              canvas.width = img.width;
              canvas.height = img.height;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img,0,0);
              ctx.strokeStyle = "#00FF00";
              ctx.lineWidth = 3;
              ctx.font = "18px serif";
              boxes.forEach(([x1,y1,x2,y2,label]) => {
                  ctx.strokeRect(x1,y1,x2-x1,y2-y1);
                  ctx.fillStyle = "#00ff00";
                  const width = ctx.measureText(label).width;
                  ctx.fillRect(x1,y1,width+10,25);
                  ctx.fillStyle = "#000000";
                  ctx.fillText(label,x1,y1+18);
              });
          }
       }
  </script>  
</body>
</html>
